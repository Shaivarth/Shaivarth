<?xml version="1.0" encoding="UTF-8"?>

<svg
    xmlns="http://www.w3.org/2000/svg"
    font-family="ConsolasFallback,Consolas,monospace"
    width="330px"
    height="50px"
    font-size="16px"
>
    <style>
        @font-face {
            src: local('Consolas'), local('Consolas Bold');
            font-family: 'ConsolasFallback';
            font-display: swap;
            -webkit-size-adjust: 109%;
            size-adjust: 109%;
        }

        .key {
            fill: #ffa657;
        }

        .value {
            fill: #a5d6ff;
        }

        .cc {
            fill: #616e7f;
        }

        text, tspan {
            white-space: pre;
        }
    </style>

    <text
        x="5"
        y="30"
        fill="#c9d1d9"
    >
        <tspan class="key">Email</tspan>:<tspan class="cc"> </tspan><tspan class="value">sarthakatwork08@gmail.com</tspan>
    </text>
</svg>
